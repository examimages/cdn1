<svg width="360" height="109" xmlns="http://www.w3.org/2000/svg" viewBox="30 15 740 165">
  <defs>
    <!-- Simple arrowhead marker for future-proofing, though not used in this specific output as per instructions -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
    <style>
      .label { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        font-size: 30px; 
        fill: #000000; 
        text-anchor: middle; 
      }
      .line { 
        stroke: #000000; 
        stroke-width: 3; 
        stroke-linecap: round; 
        fill: none; 
      }
    </style>
  </defs>

  <!-- Main Horizontal Number Line -->
  <line x1="50" y1="100" x2="750" y2="100" class="line" />

  <!-- Vertical Tick Marks -->
  <!-- Tick for -12 -->
  <line x1="200" y1="85" x2="200" y2="115" class="line" />
  <!-- Tick for 3 -->
  <line x1="450" y1="85" x2="450" y2="115" class="line" />
  <!-- Tick for 4 -->
  <line x1="600" y1="85" x2="600" y2="115" class="line" />

  <!-- Numerical Labels (Below Line) -->
  <text x="200" y="155" class="label">-12</text>
  <text x="450" y="155" class="label">3</text>
  <text x="600" y="155" class="label">4</text>

  <!-- Interval Signs (Above Line) -->
  <!-- Left of -12 -->
  <text x="110" y="65" class="label">-</text>
  <!-- Between -12 and 3 -->
  <text x="325" y="65" class="label">+</text>
  <!-- Between 3 and 4 -->
  <text x="525" y="65" class="label">-</text>
  <!-- Right of 4 -->
  <text x="690" y="65" class="label">-</text>
</svg>